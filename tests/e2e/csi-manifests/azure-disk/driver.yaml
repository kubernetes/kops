# Manifest for Kubernetes external tests.
# See https://github.com/kubernetes/kubernetes/tree/master/test/e2e/storage/external
# https://github.com/kubernetes-sigs/azuredisk-csi-driver/blob/master/test/external-e2e/manifest/testdriver.yaml

StorageClass:
  FromFile: tests/e2e/csi-manifests/azure-disk/sc.yaml
DriverInfo:
  Name: disk.csi.azure.com
  SupportedSizeRange:
    Min: 1Gi
  SupportedFsType:
    ext4: {}
    ext3: {}
    xfs: {}
  Capabilities:
    persistence: true
    fsGroup: true
    block: true
    exec: true
    multipods: true
    controllerExpansion: true
    nodeExpansion: true
    onlineExpansion: true
    volumeLimits: true
    singleNodeVolume: true
    topology: true
    snapshotDataSource: false
    pvcDataSource: false
    RWX: false
    readWriteOncePod: true
# The disk.csi.azure.com driver's attach/detach operations are ARM control-plane
# calls that routinely take longer than the framework's default TimeoutContext
# values, causing PersistentVolume e2e flakes (pods stuck Pending on volume mount,
# slow PV deletion). These keys map to framework.TimeoutContext fields and override
# the defaults for the external storage tests only.
Timeouts:
  PodStart: 15m
  PodStartSlow: 20m
  ClaimProvision: 10m
  ClaimBound: 10m
  PVDelete: 15m
  PVDeleteSlow: 30m
  PodDelete: 10m
