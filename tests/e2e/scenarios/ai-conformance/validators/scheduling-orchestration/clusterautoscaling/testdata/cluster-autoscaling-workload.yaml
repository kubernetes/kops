# Deployment that requests a GPU via DRA and runs nvidia-smi periodically.
# The test creates this with N+1 replicas (where N is the current GPU node count),
# forcing the cluster autoscaler to provision an additional GPU node.

apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: cluster-autoscaling-workload
spec:
  spec:
    devices:
      requests:
      - name: single-gpu
        exactly:
          deviceClassName: gpu.nvidia.com
          allocationMode: ExactCount
          count: 1

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaling-workload
  labels:
    app: cluster-autoscaling-workload
spec:
  # replicas is set dynamically by the test via kubectl scale
  replicas: 1
  selector:
    matchLabels:
      app: cluster-autoscaling-workload
  template:
    metadata:
      labels:
        app: cluster-autoscaling-workload
    spec:
      terminationGracePeriodSeconds: 5
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: cluster-autoscaling-workload
      containers:
      - name: cluster-autoscaling-workload
        image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0
        command:
        - "/bin/sh"
        - "-c"
        - |
          while true; do
            echo "$(date -Iseconds) GPU probe alive on $(hostname)"
            nvidia-smi --query-gpu=name,temperature.gpu,utilization.gpu,memory.used,memory.total --format=csv,noheader
            sleep 60
          done
        resources:
          claims:
          - name: gpu
          limits:
            cpu: "500m"
            memory: 512Mi
          requests:
            cpu: "100m"
            memory: 128Mi
