version: "2"
run:
  go: "1.25"
linters:
  default: none
  enable:
    - misspell
  settings:
    misspell:
      mode: default
      # Leave locale unset so both US and UK English spellings are accepted.
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ^zz_generated.*
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
