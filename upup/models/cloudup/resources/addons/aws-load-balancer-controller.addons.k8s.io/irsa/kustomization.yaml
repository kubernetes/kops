# IRSA variant: controller uses a projected service account token for AWS
# credentials and can schedule on any node.
#
# To regenerate the manifest:
#   cd upup/models/cloudup/resources/addons/aws-load-balancer-controller.addons.k8s.io
#   kustomize build --enable-helm irsa > k8s-1.19-irsa.yaml.template

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: aws-load-balancer-controller
    repo: https://aws.github.io/eks-charts
    version: "3.3.0"
    releaseName: aws-load-balancer-controller
    namespace: kube-system
    includeCRDs: true
    valuesFile: helm-values.yaml

patches:
  - target:
      kind: Deployment
      name: aws-load-balancer-controller
    patch: |
      # Chart's bool `enableShield/Waf/Wafv2` guards and map `defaultTags`
      # helper don't accept Go-template strings, so append those args here.
      # `--ingress-class=alb` already comes from the chart default.
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --enable-waf={{ .CloudProvider.AWS.LoadBalancerController.EnableWAF }}
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --enable-wafv2={{ .CloudProvider.AWS.LoadBalancerController.EnableWAFv2 }}
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --enable-shield={{ .CloudProvider.AWS.LoadBalancerController.EnableShield }}
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--default-tags={{ CloudLabels }}"
      # NODENAME env var via fieldRef (chart's `env` is key/value only).
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: NODENAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: spec.nodeName

  # kops uses its own cert-manager setup (self-signed Issuer + Certificate).
  # Delete the chart's root CA machinery.
  - target:
      kind: Certificate
      name: aws-load-balancer-root-cert
    patch: |
      $patch: delete
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: aws-load-balancer-root-cert
  - target:
      kind: Issuer
      name: aws-load-balancer-root-issuer
    patch: |
      $patch: delete
      apiVersion: cert-manager.io/v1
      kind: Issuer
      metadata:
        name: aws-load-balancer-root-issuer

  # Re-point the serving cert at the selfsigned Issuer (since the root
  # Issuer is deleted) and rename its secret to match the existing kops name.
  - target:
      kind: Certificate
      name: aws-load-balancer-serving-cert
    patch: |
      - op: replace
        path: /spec/secretName
        value: aws-load-balancer-webhook-tls
      - op: replace
        path: /spec/issuerRef
        value:
          kind: Issuer
          name: aws-load-balancer-selfsigned-issuer
  - target:
      kind: Deployment
      name: aws-load-balancer-controller
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0/secret/secretName
        value: aws-load-balancer-webhook-tls

  # A Deployment's spec.selector is immutable, so adopting the chart's
  # {instance, name} selector breaks in-place upgrades from kops <1.36. Pin both
  # selectors to the historical {component, name} labels and label pods to match.
  - target:
      kind: Deployment
      name: aws-load-balancer-controller
    patch: |
      - op: replace
        path: /spec/selector/matchLabels
        value:
          app.kubernetes.io/component: controller
          app.kubernetes.io/name: aws-load-balancer-controller
      - op: add
        path: /spec/template/metadata/labels/app.kubernetes.io~1component
        value: controller
  - target:
      kind: Service
      name: aws-load-balancer-webhook-service
    patch: |
      - op: replace
        path: /spec/selector
        value:
          app.kubernetes.io/component: controller
          app.kubernetes.io/name: aws-load-balancer-controller

  # The E2E suite runs a test that requires the ALBTargetControlAgent=true feature gate
  # the test is skipped based on the presence of this CRD and the upstream helm chart
  # doesn't offer a way to not render it, so we delete it here instead.
  - target:
      kind: CustomResourceDefinition
      name: albtargetcontrolconfigs.elbv2.k8s.aws
    patch: |
      $patch: delete
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: albtargetcontrolconfigs.elbv2.k8s.aws