# To regenerate the manifest:
#   cd upup/models/cloudup/resources/addons/azure-cloud-controller.addons.k8s.io
#   ./regenerate.sh

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cloud-provider-azure
    repo: https://raw.githubusercontent.com/kubernetes-sigs/cloud-provider-azure/master/helm/repo
    version: "1.34.5"
    releaseName: cloud-provider-azure
    namespace: kube-system
    valuesFile: helm-values.yaml

patches:
  - target:
      kind: Deployment
      name: cloud-controller-manager
    patch: |
      # CCM runs on control plane with hostNetwork; use localhost like AWS/GCP.
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: KUBERNETES_SERVICE_HOST
            value: "127.0.0.1"
      # Chart builds the image from repo/name/tag; replace with a single Go template expression.
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: '{{ .ExternalCloudControllerManager.Image }}'
      # CPU request uses `or` with quotes which breaks Helm's YAML parser, so it's patched here.
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: '{{ or .ExternalCloudControllerManager.CPURequest "100m" }}'
      # kOps schedules the CCM on control-plane nodes that may carry arbitrary taints; tolerate all.
      - op: replace
        path: /spec/template/spec/tolerations
        value:
          - operator: Exists
  - target:
      kind: DaemonSet
      name: cloud-node-manager
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: '{{ .ExternalCloudControllerManager.AzureNodeManagerImage }}'
      # node-manager runs on every node; tolerate all taints.
      - op: replace
        path: /spec/template/spec/tolerations
        value:
          - operator: Exists
  # Remove Windows resources.
  - target:
      kind: DaemonSet
      name: cloud-node-manager-windows
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: cloud-node-manager-windows
  - target:
      kind: ConfigMap
      name: cloud-provider-azure-scripts
    patch: |
      $patch: delete
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cloud-provider-azure-scripts
